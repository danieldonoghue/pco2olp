name: Deploy Documentation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (e.g. v1.2.3) — defaults to latest release'
        required: false
        type: string

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Deploying docs for ${VERSION}"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll
        run: |
          bundle exec jekyll build \
            --baseurl "/pco2olp/${{ steps.version.outputs.version }}"
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Deploy to gh-pages
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          # Fetch or create gh-pages branch
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add _gh_pages origin/gh-pages
          else
            # git worktree add --orphan requires git 2.42+; use checkout --orphan instead
            git worktree add _gh_pages HEAD
            git -C _gh_pages checkout --orphan gh-pages
            git -C _gh_pages rm -rf . > /dev/null 2>&1 || true
            touch _gh_pages/.nojekyll
          fi

          # Deploy versioned copy
          rm -rf "_gh_pages/${VERSION}"
          cp -r docs/_site "_gh_pages/${VERSION}"

          cd _gh_pages

          # Ensure .nojekyll exists (tells GitHub Pages not to run Jekyll again)
          touch .nojekyll

          # Update versions.json
          python3 "$GITHUB_WORKSPACE/.github/scripts/update_versions.py"

          # Update root redirect to latest
          {
            echo '<!DOCTYPE html>'
            echo '<html>'
            echo '<head>'
            echo '  <meta charset="utf-8">'
            echo '  <meta http-equiv="refresh" content="0;url=latest/">'
            echo '  <title>pco2olp Documentation</title>'
            echo '</head>'
            echo '<body>'
            printf '  <p>Redirecting to <a href="latest/">latest documentation</a>\xe2\x80\xa6</p>\n'
            echo '</body>'
            echo '</html>'
          } > index.html

          # Update latest/ redirect to point to newest version
          LATEST=$(python3 -c "import json; d=json.load(open('versions.json')); print(d['latest'])")
          mkdir -p latest
          {
            echo '<!DOCTYPE html>'
            echo '<html>'
            echo '<head>'
            echo '  <meta charset="utf-8">'
            printf '  <meta http-equiv="refresh" content="0;url=../%s/">\n' "${LATEST}"
            echo '  <title>pco2olp Documentation</title>'
            echo '</head>'
            echo '<body>'
            printf '  <p>Redirecting to <a href="../%s/">latest documentation</a>\xe2\x80\xa6</p>\n' "${LATEST}"
            echo '</body>'
            echo '</html>'
          } > latest/index.html

          git add .
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Deploy docs ${VERSION}"
          git push origin HEAD:gh-pages
        env:
          VERSION: ${{ steps.version.outputs.version }}
